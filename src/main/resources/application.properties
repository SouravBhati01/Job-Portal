# ============================================================
# Application
# ============================================================
spring.application.name=job-portal-system
server.port=8080
server.servlet.context-path=/api

# ============================================================
# PostgreSQL - Production
# ============================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USERNAME:postgres.jtodhiurdlpdnypbjiap}
spring.datasource.password=${DB_PASSWORD:Sourav12###}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT - MUST SET VIA ENVIRONMENT VARIABLES IN PRODUCTION!
# ============================================================
# Generate secret with: openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:dGhpcy1pcy1hLXNlY3VyZS1hbmQtc3VmZmljaWVudGx5LWxvbmctc2VjcmV0LWtleS1mb3Itam9iLXBvcnRhbC1zeXN0ZW0tMjAyNg==}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# File Storage
# ============================================================
app.upload.dir=${UPLOAD_DIR:uploads/resumes}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================
# Actuator
# ============================================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
info.app.name=Job Portal System
info.app.version=1.0.0
info.app.description=Enterprise Job Portal REST API

# ============================================================
# Logging
# ============================================================
logging.level.com.jobportal=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n

# ============================================================
# CORS Configuration
# ============================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080}

